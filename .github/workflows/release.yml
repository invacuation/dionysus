name: release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: release please
    # Canonical-repo guard prevents this write-enabled job from running in forks.
    if: github.actor != 'github-actions[bot]' && github.repository == 'invacuation/dionysus'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      # googleapis/release-please-action@v4
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: read release pull request metadata
        if: steps.release.outputs.prs_created == 'true'
        id: release-pr
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          pr = json.loads(os.environ["RELEASE_PR"])
          print(f"head_branch={pr['headBranchName']}")
          print(f"title={pr['title']}")
          PY

      - name: trigger CI for release pull request
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.release-pr.outputs.head_branch }}
          PR_TITLE: ${{ steps.release-pr.outputs.title }}
        run: gh workflow run ci.yml --ref "$HEAD_BRANCH" -f pr_title="$PR_TITLE"
