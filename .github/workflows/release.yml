name: release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: release please
    # Canonical-repo guard prevents this write-enabled job from running in forks.
    if: github.actor != 'github-actions[bot]' && github.repository == 'invacuation/dionysus'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: check release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "Configure the RELEASE_PLEASE_TOKEN secret so Release Please PRs trigger CI."
            exit 1
          fi

      # googleapis/release-please-action@v4
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          # Use a PAT or GitHub App token so Release Please PRs trigger
          # pull_request workflows. GITHUB_TOKEN-created PRs do not.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    name: publish docker image
    needs: release
    if: needs.release.outputs.release_created == 'true' && github.repository == 'invacuation/dionysus'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: set up qemu
        # docker/setup-qemu-action@v3
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: set up docker buildx
        # docker/setup-buildx-action@v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: log in to ghcr
        # docker/login-action@v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker metadata
        id: meta
        # docker/metadata-action@v5
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/invacuation/dionysus
          tags: |
            type=raw,value=${{ needs.release.outputs.tag_name }}
            type=raw,value=latest

      - name: build and push image
        # docker/build-push-action@v6
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
