name: release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: release please
    # Canonical-repo guard prevents this write-enabled job from running in forks.
    if: github.actor != 'github-actions[bot]' && github.repository == 'invacuation/dionysus'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # googleapis/release-please-action@v4
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
