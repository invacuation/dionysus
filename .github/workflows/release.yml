name: release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: release please
    # Canonical-repo guard prevents this write-enabled job from running in forks.
    if: github.actor != 'github-actions[bot]' && github.repository == 'invacuation/dionysus'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: check release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "Configure the RELEASE_PLEASE_TOKEN secret so Release Please PRs trigger CI."
            exit 1
          fi

      # googleapis/release-please-action@v4
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          # Use a PAT or GitHub App token so Release Please PRs trigger
          # pull_request workflows. GITHUB_TOKEN-created PRs do not.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
