name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited]

permissions: read-all

jobs:
  pr-title-conventional:
    name: pr title conventional commit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Validating PR title: $PR_TITLE"
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?(!)?: .+'; then
            echo "PR title must follow Conventional Commits format."
            echo "Example: feat(api): add audit endpoint"
            exit 1
          fi

  backend-quality:
    name: python backend quality
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: install uv
        # astral-sh/setup-uv@v4
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f

      - name: set up python
        run: uv python install 3.13

      - name: check lockfile
        working-directory: python
        run: uv lock --check

      - name: install backend dependencies
        working-directory: python
        run: uv sync --dev

      - name: run ruff
        working-directory: python
        run: uv run ruff check .

      - name: check formatting
        working-directory: python
        run: uv run ruff format --check .

      - name: run ty
        working-directory: python
        run: uv run ty check src tests migrations

      - name: run backend tests
        working-directory: python
        run: uv run pytest

  go-backend-quality:
    name: go backend quality
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: set up go
        # actions/setup-go@v5
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: run go tests
        working-directory: backend
        run: go test ./...

  api-parity-contracts:
    name: api parity contracts
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: install uv
        # astral-sh/setup-uv@v4
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f

      - name: set up python
        run: uv python install 3.13

      - name: set up go
        # actions/setup-go@v5
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: install backend dependencies
        working-directory: python
        run: uv sync --dev

      - name: run python/go api parity contracts
        working-directory: python
        run: uv run python ../scripts/parity_contract.py

  migrations:
    name: database migrations
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: install uv
        # astral-sh/setup-uv@v4
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f

      - name: set up python
        run: uv python install 3.13

      - name: install backend dependencies
        working-directory: python
        run: uv sync --dev

      - name: upgrade to head
        working-directory: python
        run: uv run alembic upgrade head

      - name: downgrade to base
        working-directory: python
        run: uv run alembic downgrade base

      - name: upgrade again
        working-directory: python
        run: uv run alembic upgrade head

  frontend-quality:
    name: frontend quality
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: set up node
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"

      - name: set up bun
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: run frontend tests
        working-directory: frontend
        run: bun test

      - name: run typecheck
        working-directory: frontend
        run: bun run typecheck

      - name: build frontend
        working-directory: frontend
        run: bun run build

  frontend-e2e:
    name: frontend e2e
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: set up node
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"

      - name: set up bun
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: install playwright
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: run e2e tests
        working-directory: frontend
        run: bun run e2e

      - name: upload playwright artifacts
        if: failure()
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/

  docker-compose:
    name: docker compose smoke
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: set up node
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"

      - name: set up bun
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: install playwright
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: build app image
        run: docker compose build app

      - name: start app
        run: docker compose up --build -d app

      - name: wait for app
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/ > /tmp/dionysus-index.html; then
              grep -q '<div id="root"></div>' /tmp/dionysus-index.html
              exit 0
            fi
            docker compose ps
            docker compose logs --no-color --tail=80 app
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color app
          exit 1

      - name: run deployed app e2e
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:8000
          E2E_REAL_BACKEND: "1"
        run: bun run e2e:deployed

      - name: upload deployed playwright artifacts
        if: failure()
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deployed-playwright-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/

      - name: stop app
        if: always()
        run: docker compose down --volumes --remove-orphans
