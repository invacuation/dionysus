services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DIONYSUS_ENVIRONMENT: local
      DIONYSUS_DATABASE_URL: ${DIONYSUS_DATABASE_URL:-sqlite:////app/var/dionysus.db}
    volumes:
      - ./var:/app/var
    depends_on:
      db:
        condition: service_healthy
        required: false

  db:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: dionysus
      POSTGRES_PASSWORD: dionysus
      POSTGRES_DB: dionysus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dionysus -d dionysus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
